# CommunityOS admin — navigation smoke across the main sections.
id: smoke-navigation
name: Navigate the main admin sections
suite: smoke
platform: web
priority: P1
tags: [smoke, navigation]
source_flow: "flow:admin-navigation"

steps:
  - goto: "{{project.base_url}}/login"
  - fill: { label: "Phone number", value: "{{data.admin_phone}}" }
  - click: "Send OTP"
  - fill: { label: "OTP", value: "{{data.admin_otp}}" }
  - click: "Verify"
  - expect_url_contains: "/dashboard"
  - goto: "{{project.base_url}}/maintenance-requests"
  - expect_visible: "Maintenance"
  - goto: "{{project.base_url}}/residents"
  - expect_visible: "Residents"
  - goto: "{{project.base_url}}/announcements"
  - expect_visible: "Announcements"

assertions:
  - no_console_errors: true

verify_backend:
  window_ms: 8000
  expect:
    - no_5xx: true
    - no_new_crashes: true
