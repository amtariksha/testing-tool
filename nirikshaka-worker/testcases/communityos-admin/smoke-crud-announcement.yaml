# CommunityOS admin — one CRUD round-trip (entity to be confirmed against
# staging at Gate 2; announcements chosen as the safest create/delete).
id: smoke-crud
name: Create and delete an announcement
suite: smoke
platform: web
priority: P0
tags: [smoke, crud]
source_flow: "flow:admin-announcement-crud"

data:
  run_tag: "nirikshaka-smoke"

steps:
  - goto: "{{project.base_url}}/login"
  - fill: { label: "Phone number", value: "{{data.admin_phone}}" }
  - click: "Send OTP"
  - fill: { label: "OTP", value: "{{data.admin_otp}}" }
  - click: "Verify"
  - expect_url_contains: "/dashboard"
  - goto: "{{project.base_url}}/announcements"
  - click: "New Announcement"
  - fill: { label: "Title", value: "QA {{data.run_tag}}" }
  - fill: { label: "Description", value: "Automated smoke check — safe to delete" }
  - click: "Publish"
  - expect_visible: "QA {{data.run_tag}}"

cleanup:
  - click: "QA {{data.run_tag}}"
  - click: "Delete"
  - expect_hidden: "QA {{data.run_tag}}"

verify_backend:
  window_ms: 8000
  expect:
    - no_5xx: true
    - no_new_crashes: true
    - api_succeeded: { path_contains: "announcement", method: POST, status_lt: 400 }
